<?xml version="1.0" encoding="UTF-8"?>
<!--
  Vortex — Logo (SVG source)
  Spec: BRAND.md §Logo
  Forme : spirale/tourbillon stylisée (Archimedean)
  Couleurs : indigo primary #5B4AE6 + cyan accent #00D9FF
  Style : minimal, géométrique, pas de gradient complexe
  Auteur : Zoe (généré 2026-06-13 à partir de la brand spec)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Vortex logo">
  <title>Vortex</title>
  <desc>Spirale indigo et cyan, marque de l'optimiseur PC open-source.</desc>

  <!-- Bras indigo (couche principale, 2.5 tours) -->
  <path d="M 128 16
           A 112 112 0 0 1 240 128
           A 96 96 0 0 1 144 224
           A 80 80 0 0 1 64 144
           A 64 64 0 0 1 128 80
           A 48 48 0 0 1 176 128"
        fill="none" stroke="#5B4AE6" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Bras cyan (couche accent, déphasée +180°, 2 tours) -->
  <path d="M 128 240
           A 112 112 0 0 1 16 128
           A 88 88 0 0 1 128 48
           A 64 64 0 0 1 184 128"
        transform="rotate(180 128 128)"
        fill="none" stroke="#00D9FF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Noyau central -->
  <circle cx="128" cy="128" r="10" fill="#5B4AE6" />
  <circle cx="128" cy="128" r="4" fill="#00D9FF" />
</svg>
